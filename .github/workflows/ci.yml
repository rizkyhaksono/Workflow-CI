name: CI - MLflow Project

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Tracking store lokal (hermetik) selama CI.
      MLFLOW_TRACKING_URI: file:./mlruns

    steps:
      # Set up job (implisit oleh runner)
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Working dir: $(pwd)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.5.2 pandas==2.2.3 numpy==1.26.4 joblib==1.4.2 matplotlib==3.10.8

      - name: Run mlflow project
        working-directory: MLProject
        run: |
          mlflow run . --env-manager local

      - name: Get latest MLflow run_id
        working-directory: MLProject
        run: |
          RUN_ID=$(python -c "import mlflow; mlflow.set_tracking_uri('file:./mlruns'); r=mlflow.search_runs(order_by=['start_time DESC'], max_results=1); print(r.loc[0,'run_id'])")
          echo "Captured RUN_ID=$RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          pip install --upgrade mlflow==2.19.0

      - name: Upload to GitHub (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model
          path: MLProject/mlruns/

      - name: Build Docker Model
        working-directory: MLProject
        run: |
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/model" \
            --name "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model:latest" \
            --env-manager local

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model:latest" \
                     "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model:${{ github.sha }}"

      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model:latest"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model:${{ github.sha }}"
